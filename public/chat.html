<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chat — Claude Code Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@15/lib/marked.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <nav>
      <a href="/">Dashboard</a>
      <a href="/chat.html" class="active">Chat</a>
    </nav>

    <div id="session-picker" class="panel">
      <div class="picker-header">
        <h2>Select a Session</h2>
        <div class="picker-header-actions">
          <button id="add-btn" onclick="openAddModal()">+ Add Workspace</button>
          <button id="restore-btn" onclick="openRestoreModal()">Restore Session</button>
        </div>
      </div>
      <div id="session-list"></div>
    </div>

    <div id="chat-view" class="panel" style="display:none">
      <div id="chat-header">
        <div id="chat-header-left">
          <button id="back-btn" onclick="showPicker()">&larr; Back</button>
          <span id="chat-session-name"></span>
          <span id="chat-session-status" class="status"></span>
        </div>
        <div id="chat-header-right">
          <div class="tools-dropdown">
            <button id="tools-btn" onclick="toggleToolsMenu()">Tools &#9662;</button>
            <div id="tools-menu" class="tools-menu hidden">
              <button onclick="openSendToModal(); closeToolsMenu()">Send to Workspace</button>
              <button id="hub-menu-btn" onclick="setAsHub(); closeToolsMenu()">Set as Hub</button>
              <label class="tools-menu-toggle" onclick="event.stopPropagation()">
                <input type="checkbox" id="rc-checkbox" onchange="toggleRemoteControl()" />
                <span>Remote Control</span>
              </label>
              <hr />
              <button class="tools-menu-danger" onclick="removeCurrentSession(); closeToolsMenu()">Remove Session</button>
            </div>
          </div>
        </div>
      </div>
      <div id="messages"></div>
      <div id="image-preview" style="display:none">
        <div id="image-preview-list"></div>
      </div>
      <form id="chat-form">
        <button type="button" id="attach-img-btn" onclick="document.getElementById('image-file-input').click()" title="Attach image">🖼️</button>
        <input type="file" id="image-file-input" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden />
        <input type="text" id="chat-input" placeholder="Type a message or paste an image..." autocomplete="off" />
        <button type="button" id="interrupt-btn" onclick="interruptSession()" style="display:none">Stop</button>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </div>
    <!-- Add workspace modal -->
    <div id="add-modal" style="display:none">
      <div class="restore-backdrop" onclick="closeAddModal()"></div>
      <div class="restore-content" style="max-width:480px">
        <div class="restore-header">
          <h3>Add Workspace</h3>
          <button onclick="closeAddModal()" class="restore-close">&times;</button>
        </div>
        <div id="add-body">
          <label class="add-label">Name</label>
          <input type="text" id="add-name" class="add-input" placeholder="My Workspace" autocomplete="off" />
          <label class="add-label">Working Directory</label>
          <input type="text" id="add-cwd" class="add-input" placeholder="/home/claude/workspace" autocomplete="off" />
          <label class="add-label">Initial Prompt <span style="color:#8b949e;font-weight:400">(optional)</span></label>
          <input type="text" id="add-prompt" class="add-input" placeholder="e.g. Review the codebase and summarize it" autocomplete="off" />
          <div class="add-actions">
            <button onclick="closeAddModal()" class="add-cancel-btn">Cancel</button>
            <button onclick="createWorkspace()" id="add-submit-btn" class="restore-action-btn">Create</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Restore session modal -->
    <div id="restore-modal" style="display:none">
      <div class="restore-backdrop" onclick="closeRestoreModal()"></div>
      <div class="restore-content">
        <div class="restore-header">
          <h3>Restore Session</h3>
          <button onclick="closeRestoreModal()" class="restore-close">&times;</button>
        </div>
        <div id="restore-body">
          <div id="restore-folders">
            <p class="restore-hint">Select a project folder to browse sessions:</p>
            <div id="restore-folder-list"></div>
          </div>
          <div id="restore-sessions" style="display:none">
            <button onclick="showFolders()" class="restore-back">&larr; Back to folders</button>
            <p class="restore-hint">Sessions in <strong id="restore-folder-name"></strong>:</p>
            <div id="restore-session-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

    <!-- Send to workspace modal -->
    <div id="sendto-modal" style="display:none">
      <div class="restore-backdrop" onclick="closeSendToModal()"></div>
      <div class="restore-content" style="max-width:540px">
        <div class="restore-header">
          <h3>Send to Workspace</h3>
          <button onclick="closeSendToModal()" class="restore-close">&times;</button>
        </div>
        <div id="sendto-body">
          <label class="add-label">Target Workspace</label>
          <select id="sendto-target" class="add-input"></select>
          <label class="add-label">Your Request</label>
          <textarea id="sendto-text" class="add-input" rows="4" placeholder="What would you like the target workspace to do?"></textarea>
          <div id="sendto-images-preview" style="display:none">
            <div id="sendto-images-list"></div>
          </div>
          <div class="sendto-attach-row">
            <button type="button" class="sendto-attach-btn" onclick="document.getElementById('sendto-file-input').click()">&#x1f5bc;&#xfe0f; Attach Image</button>
            <input type="file" id="sendto-file-input" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden />
          </div>
          <label class="add-label" style="margin-top:0.75rem">Context Mode</label>
          <div class="sendto-mode-toggle">
            <button type="button" class="sendto-mode-btn active" data-mode="recent" onclick="setSendToMode('recent')">Last 20 Messages</button>
            <button type="button" class="sendto-mode-btn" data-mode="summary" onclick="setSendToMode('summary')">AI Summary</button>
          </div>
          <p class="restore-hint" id="sendto-mode-hint" style="margin-top:0.4rem">The last 20 messages from this session will be included as context.</p>
          <div class="add-actions">
            <button onclick="closeSendToModal()" class="add-cancel-btn">Cancel</button>
            <button onclick="sendToWorkspace()" id="sendto-submit-btn" class="restore-action-btn">Send</button>
          </div>
        </div>
      </div>
    </div>

  <!-- Image preview modal -->
  <div id="image-modal" style="display:none" onclick="closeImagePreview()">
    <img id="image-modal-img" src="" alt="Preview" onclick="event.stopPropagation()" />
    <button id="image-modal-close" onclick="closeImagePreview()">&times;</button>
  </div>

  <script>
    const API = '';
    let ws = null;
    let currentRoom = null;
    let currentSessionId = null;
    let WORKSPACE_DIR = '/home/claude/workspace'; // default, updated on load

    async function loadSessions() {
      const res = await fetch(`${API}/api/sessions`);
      const data = await res.json();
      const list = document.getElementById('session-list');
      list.innerHTML = '';

      for (const s of data.sessions) {
        const div = document.createElement('div');
        div.className = 'session-card';
        const channelBadge = s.channel
          ? `<span class="badge channel">${s.channel.type}:${s.channel.targetId}</span>`
          : '';
        const rcBadge = s.remoteControl
          ? '<span class="badge rc">RC</span>'
          : '';
        const hubBadge = s.isHub
          ? '<span class="badge hub">Hub</span>'
          : '';
        div.innerHTML = `
          <button class="session-remove" onclick="removeSession('${s.id}', event)" title="Remove session">&times;</button>
          <div class="session-name">${s.name}</div>
          <div class="session-meta">
            <span class="status ${s.status}">${s.status}</span>
            <span>${s.messageCount} msgs</span>
            ${channelBadge}${rcBadge}${hubBadge}
            <code>${s.id.slice(0, 8)}</code>
          </div>
        `;
        div.onclick = (e) => {
          if (e.target.closest('.session-remove')) return;
          joinSession(s.id, s.name, s.status, s.remoteControl, s.isHub);
        };
        list.appendChild(div);
      }
    }

    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);

      ws.onopen = () => console.log('WS connected');
      ws.onclose = () => {
        console.log('WS disconnected, reconnecting...');
        setTimeout(connectWS, 2000);
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'msg' && msg.room === currentRoom) {
          // Build data URLs from base64 images if present
          const imageUrls = msg.images?.map(img => `data:${img.mediaType};base64,${img.data}`);
          appendMessage(msg.from, msg.text, msg.ts, msg.msgType || undefined, imageUrls);
          // Show interrupt button when assistant is responding
          if (msg.from === 'assistant') {
            showInterrupt(true);
            // Auto-hide after a pause (response likely done)
            clearTimeout(window._interruptTimer);
            window._interruptTimer = setTimeout(() => showInterrupt(false), 3000);
          }
        }
      };
    }

    let currentIsHub = false;

    async function joinSession(id, name, status, remoteControl, isHub) {
      currentRoom = id;
      currentSessionId = id;
      currentIsHub = isHub || false;
      document.getElementById('session-picker').style.display = 'none';
      document.getElementById('chat-view').style.display = 'flex';
      document.getElementById('chat-session-name').textContent = name;
      const statusEl = document.getElementById('chat-session-status');
      statusEl.textContent = status;
      statusEl.className = `status ${status}`;

      // Set remote control checkbox
      const rcCheckbox = document.getElementById('rc-checkbox');
      rcCheckbox.checked = remoteControl;

      // Clear and load history
      const container = document.getElementById('messages');
      container.innerHTML = '<div class="loading">Loading messages...</div>';

      try {
        const res = await fetch(`${API}/api/sessions/${id}/messages`);
        const data = await res.json();
        container.innerHTML = '';

        for (const msg of data.messages) {
          // Build data URLs from base64 images in history
          const imageUrls = msg.images?.map(img => `data:${img.mediaType};base64,${img.data}`);
          appendMessage(msg.from, msg.text, msg.ts, msg.type, imageUrls);
        }
      } catch (err) {
        container.innerHTML = '';
        console.error('Failed to load messages:', err);
      }

      document.getElementById('chat-input').focus();

      // Join the room via WebSocket
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'join', room: id, sessionId: id }));
      }
    }

    function showPicker() {
      currentRoom = null;
      currentSessionId = null;
      document.getElementById('session-picker').style.display = 'block';
      document.getElementById('chat-view').style.display = 'none';
      loadSessions();
    }

    function showInterrupt(show) {
      document.getElementById('interrupt-btn').style.display = show ? 'inline-block' : 'none';
    }

    async function interruptSession() {
      if (!currentSessionId) return;
      showInterrupt(false);
      try {
        const res = await fetch(`${API}/api/sessions/${currentSessionId}/interrupt`, { method: 'POST' });
        const data = await res.json();
        if (data.interrupted) {
          appendMessage('assistant', '⏹ Session interrupted', new Date().toISOString(), 'tool');
        } else if (data.error) {
          appendMessage('assistant', 'Interrupt failed: ' + data.error, new Date().toISOString(), 'tool');
        }
      } catch (err) {
        console.error('Interrupt failed:', err);
      }
    }

    async function toggleRemoteControl() {
      if (!currentSessionId) return;
      const checkbox = document.getElementById('rc-checkbox');
      const enabled = checkbox.checked;

      try {
        const res = await fetch(`${API}/api/sessions/${currentSessionId}/remote-control`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled }),
        });
        const data = await res.json();
        if (data.error) {
          alert('Failed: ' + data.error);
          checkbox.checked = !enabled; // revert
        }
      } catch (err) {
        alert('Failed to toggle remote control');
        checkbox.checked = !enabled; // revert
      }
    }

    async function removeSession(sessionId, event) {
      event.stopPropagation();
      const card = event.target.closest('.session-card');
      const name = card?.querySelector('.session-name')?.textContent || sessionId.slice(0, 8);
      if (!confirm(`Remove session "${name}"?`)) return;

      try {
        const res = await fetch(`${API}/api/sessions/${sessionId}/end`, { method: 'POST' });
        const data = await res.json();
        if (data.error) {
          console.error('Remove failed:', data.error);
        }
      } catch (err) {
        console.error('Remove failed:', err);
      }
      loadSessions();
    }

    async function removeCurrentSession() {
      if (!currentSessionId) return;
      const name = document.getElementById('chat-session-name').textContent || currentSessionId.slice(0, 8);
      if (!confirm(`Remove session "${name}"?`)) return;

      try {
        const res = await fetch(`${API}/api/sessions/${currentSessionId}/end`, { method: 'POST' });
        const data = await res.json();
        if (data.error) {
          console.error('Remove failed:', data.error);
          return;
        }
      } catch (err) {
        console.error('Remove failed:', err);
        return;
      }
      showPicker();
    }

    async function setAsHub() {
      if (!currentSessionId || currentIsHub) return;

      try {
        const res = await fetch(`${API}/api/sessions/${currentSessionId}/set-hub`, { method: 'POST' });
        const data = await res.json();
        if (data.error) {
          return;
        }
        currentIsHub = true;
      } catch (err) {
        console.error('Set hub failed:', err);
      }
    }

    function appendMessage(from, text, ts, msgType, imageUrls) {
      const div = document.createElement('div');
      const type = msgType || 'text';
      div.className = `message ${from}` + (type === 'tool' ? ' tool-summary' : '') + (type === 'result' ? ' result' : '');
      const timeStr = ts ? new Date(ts).toLocaleTimeString() : '';
      const prefix = type === 'tool' ? '<span class="tool-icon">⚙️</span> ' : '';

      // Render assistant messages as markdown, user/tool messages as plain text
      let renderedText;
      if (from === 'assistant' && type === 'text' && typeof marked !== 'undefined') {
        renderedText = marked.parse(text || '');
      } else {
        renderedText = prefix + escapeHtml(text || '');
      }

      // Build image HTML if present
      let imageHtml = '';
      if (imageUrls && imageUrls.length > 0) {
        imageHtml = '<div class="msg-images">' +
          imageUrls.map(url => `<img src="${url}" class="msg-image" onclick="openImagePreview(this.src)" />`).join('') +
          '</div>';
      }

      div.innerHTML = `<div class="msg-text">${renderedText}</div>${imageHtml}${timeStr ? `<div class="msg-time">${timeStr}</div>` : ''}`;
      const container = document.getElementById('messages');
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function openImagePreview(src) {
      document.getElementById('image-modal-img').src = src;
      document.getElementById('image-modal').style.display = 'flex';
    }

    function closeImagePreview() {
      document.getElementById('image-modal').style.display = 'none';
      document.getElementById('image-modal-img').src = '';
    }

    // Close on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeImagePreview();
    });

    // --- Image attachments ---

    let pendingImages = []; // Array of { mediaType, data, dataUrl }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const dataUrl = reader.result;
          const base64 = dataUrl.split(',')[1];
          resolve({ mediaType: file.type, data: base64, dataUrl });
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function addImageFiles(files) {
      for (const file of files) {
        if (!file.type.match(/^image\/(jpeg|png|gif|webp)$/)) continue;
        if (file.size > 20 * 1024 * 1024) continue; // 20MB max per image
        const img = await fileToBase64(file);
        pendingImages.push(img);
      }
      renderImagePreviews();
    }

    function removeImage(index) {
      pendingImages.splice(index, 1);
      renderImagePreviews();
    }

    function clearImages() {
      pendingImages = [];
      renderImagePreviews();
    }

    function renderImagePreviews() {
      const container = document.getElementById('image-preview');
      const list = document.getElementById('image-preview-list');
      if (pendingImages.length === 0) {
        container.style.display = 'none';
        list.innerHTML = '';
        return;
      }
      container.style.display = 'block';
      list.innerHTML = '';
      pendingImages.forEach((img, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'image-thumb';
        thumb.innerHTML = `
          <img src="${img.dataUrl}" alt="attachment" />
          <button class="image-thumb-remove" onclick="removeImage(${i})">&times;</button>
        `;
        list.appendChild(thumb);
      });
    }

    // File picker
    document.getElementById('image-file-input').addEventListener('change', (e) => {
      addImageFiles(e.target.files);
      e.target.value = '';
    });

    // Paste handler
    document.getElementById('chat-input').addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      const imageFiles = [];
      for (const item of items) {
        if (item.type.match(/^image\//)) {
          const file = item.getAsFile();
          if (file) imageFiles.push(file);
        }
      }
      if (imageFiles.length > 0) {
        e.preventDefault();
        addImageFiles(imageFiles);
      }
    });

    // Drag and drop
    const chatForm = document.getElementById('chat-form');
    chatForm.addEventListener('dragover', (e) => { e.preventDefault(); chatForm.classList.add('drag-over'); });
    chatForm.addEventListener('dragleave', () => chatForm.classList.remove('drag-over'));
    chatForm.addEventListener('drop', (e) => {
      e.preventDefault();
      chatForm.classList.remove('drag-over');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.match(/^image\//));
      if (files.length > 0) addImageFiles(files);
    });

    document.getElementById('chat-form').onsubmit = (e) => {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text && pendingImages.length === 0) return;
      if (!currentRoom) return;

      // Build image payload
      const images = pendingImages.length > 0
        ? pendingImages.map(img => ({ mediaType: img.mediaType, data: img.data }))
        : undefined;

      // Send via WebSocket
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'msg', text: text || '', images }));
      }

      // Render locally with image previews
      appendMessage('user', text, new Date().toISOString(), undefined, pendingImages.map(img => img.dataUrl));
      input.value = '';
      clearImages();
      showInterrupt(true);
    };

    // --- Add Workspace Modal ---

    function openAddModal() {
      document.getElementById('add-modal').style.display = 'flex';
      const nameInput = document.getElementById('add-name');
      const cwdInput = document.getElementById('add-cwd');
      nameInput.value = '';
      cwdInput.value = WORKSPACE_DIR;
      document.getElementById('add-prompt').value = '';
      nameInput.focus();
    }

    function closeAddModal() {
      document.getElementById('add-modal').style.display = 'none';
    }

    async function createWorkspace() {
      const name = document.getElementById('add-name').value.trim();
      const cwd = document.getElementById('add-cwd').value.trim();
      const prompt = document.getElementById('add-prompt').value.trim();

      if (!name) {
        document.getElementById('add-name').focus();
        return;
      }

      const btn = document.getElementById('add-submit-btn');
      btn.disabled = true;
      btn.textContent = 'Creating...';

      try {
        const body = { name };
        if (cwd) body.cwd = cwd;
        if (prompt) body.prompt = prompt;

        const res = await fetch(`${API}/api/sessions/new`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (data.error) {
          btn.textContent = 'Failed';
          btn.style.background = '#da3633';
          setTimeout(() => { btn.textContent = 'Create'; btn.disabled = false; btn.style.background = ''; }, 2000);
          return;
        }

        btn.textContent = 'Created!';
        btn.style.background = '#238636';
        setTimeout(() => {
          closeAddModal();
          btn.textContent = 'Create';
          btn.disabled = false;
          btn.style.background = '';
          loadSessions();
        }, 800);
      } catch (err) {
        btn.textContent = 'Error';
        setTimeout(() => { btn.textContent = 'Create'; btn.disabled = false; btn.style.background = ''; }, 2000);
      }
    }

    // Allow Enter to submit the add modal
    document.getElementById('add-prompt').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); createWorkspace(); }
    });

    // --- Restore Session Modal ---

    let diskSessionsCache = null;
    let activeSessionIds = new Set();

    async function openRestoreModal() {
      document.getElementById('restore-modal').style.display = 'flex';
      document.getElementById('restore-folders').style.display = 'block';
      document.getElementById('restore-sessions').style.display = 'none';

      // Load active sessions to know which ones to exclude
      try {
        const res = await fetch(`${API}/api/sessions`);
        const data = await res.json();
        activeSessionIds = new Set(data.sessions.map(s => s.id));
      } catch { activeSessionIds = new Set(); }

      // Load disk sessions
      const folderList = document.getElementById('restore-folder-list');
      folderList.innerHTML = '<div class="loading">Scanning sessions...</div>';

      try {
        const res = await fetch(`${API}/api/disk-sessions`);
        diskSessionsCache = await res.json();

        folderList.innerHTML = '';
        if (diskSessionsCache.folders.length === 0) {
          folderList.innerHTML = '<p style="color:#8b949e;text-align:center;padding:2rem">No session folders found</p>';
          return;
        }

        for (const folder of diskSessionsCache.folders) {
          const sessionCount = diskSessionsCache.sessions[folder]?.length || 0;
          const div = document.createElement('div');
          div.className = 'restore-folder-card';
          div.innerHTML = `
            <div class="restore-folder-name">${folder}</div>
            <div class="restore-folder-meta">${sessionCount} session${sessionCount !== 1 ? 's' : ''}</div>
          `;
          div.onclick = () => showSessions(folder);
          folderList.appendChild(div);
        }
      } catch (err) {
        folderList.innerHTML = `<p style="color:#f85149;text-align:center;padding:2rem">Failed to load: ${err}</p>`;
      }
    }

    function closeRestoreModal() {
      document.getElementById('restore-modal').style.display = 'none';
    }

    function showFolders() {
      document.getElementById('restore-folders').style.display = 'block';
      document.getElementById('restore-sessions').style.display = 'none';
    }

    function showSessions(folder) {
      document.getElementById('restore-folders').style.display = 'none';
      document.getElementById('restore-sessions').style.display = 'block';
      document.getElementById('restore-folder-name').textContent = folder;

      const list = document.getElementById('restore-session-list');
      list.innerHTML = '';

      const sessions = diskSessionsCache.sessions[folder] || [];

      if (sessions.length === 0) {
        list.innerHTML = '<p style="color:#8b949e;text-align:center;padding:2rem">No sessions in this folder</p>';
        return;
      }

      for (const s of sessions) {
        const isActive = activeSessionIds.has(s.id);
        const div = document.createElement('div');
        div.className = 'restore-session-card' + (isActive ? ' already-active' : '');

        const date = new Date(s.lastModified);
        const timeAgo = formatTimeAgo(date);
        const size = formatSize(s.sizeBytes);
        const displayName = s.name ? escapeHtml(s.name) : `<span style="color:#8b949e">Unnamed</span>`;

        div.innerHTML = `
          <div class="restore-session-info">
            <div class="restore-session-name">${displayName}</div>
            <code>${s.id.slice(0, 12)}...</code>
            <span class="restore-session-meta">${timeAgo} &middot; ${size}</span>
          </div>
          ${isActive
            ? '<span class="badge active-badge">Active</span>'
            : `<button class="restore-action-btn" onclick="restoreSession('${s.id}', '${s.name ? s.name.replace(/'/g, "\\'") : ''}', event)">Restore</button>`
          }
        `;
        list.appendChild(div);
      }
    }

    function formatTimeAgo(date) {
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 30) return `${days}d ago`;
      return date.toLocaleDateString();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function restoreSession(sessionId, sessionName, event) {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Restoring...';

      try {
        const name = sessionName || `restored-${sessionId.slice(0, 8)}`;
        const res = await fetch(`${API}/api/sessions/new`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resume: sessionId, name }),
        });
        const data = await res.json();

        if (data.error) {
          btn.textContent = 'Failed';
          btn.style.background = '#da3633';
          setTimeout(() => { btn.textContent = 'Restore'; btn.disabled = false; btn.style.background = ''; }, 2000);
          return;
        }

        // Success — mark as active and refresh
        activeSessionIds.add(sessionId);
        btn.textContent = 'Restored!';
        btn.style.background = '#238636';

        // Refresh the sessions list and close modal after a moment
        setTimeout(() => {
          closeRestoreModal();
          loadSessions();
        }, 1000);
      } catch (err) {
        btn.textContent = 'Error';
        btn.disabled = false;
        setTimeout(() => { btn.textContent = 'Restore'; btn.style.background = ''; }, 2000);
      }
    }

    // --- Tools dropdown ---

    function toggleToolsMenu() {
      const menu = document.getElementById('tools-menu');
      menu.classList.toggle('hidden');
      // Update hub button text in menu
      const hubBtn = document.getElementById('hub-menu-btn');
      if (currentIsHub) {
        hubBtn.textContent = '\u2713 Hub';
        hubBtn.disabled = true;
        hubBtn.style.opacity = '0.5';
      } else {
        hubBtn.textContent = 'Set as Hub';
        hubBtn.disabled = false;
        hubBtn.style.opacity = '';
      }
    }

    function closeToolsMenu() {
      document.getElementById('tools-menu').classList.add('hidden');
    }

    // Close tools menu when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.tools-dropdown')) {
        closeToolsMenu();
      }
    });

    // --- Send to Workspace ---

    let sendToImages = [];
    let sendToMode = 'recent';

    function setSendToMode(mode) {
      sendToMode = mode;
      document.querySelectorAll('.sendto-mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      document.getElementById('sendto-mode-hint').textContent = mode === 'summary'
        ? 'An AI-generated summary of this session will be created and sent. This may take a moment.'
        : 'The last 20 messages from this session will be included as context.';
    }

    async function openSendToModal() {
      document.getElementById('sendto-modal').style.display = 'flex';
      document.getElementById('sendto-text').value = '';
      sendToImages = [];
      sendToMode = 'recent';
      setSendToMode('recent');
      renderSendToImages();

      // Populate target dropdown with other sessions
      const select = document.getElementById('sendto-target');
      select.innerHTML = '';
      try {
        const res = await fetch(`${API}/api/sessions`);
        const data = await res.json();
        for (const s of data.sessions) {
          if (s.id === currentSessionId) continue; // skip current
          if (s.status !== 'running') continue; // only running sessions
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name;
          select.appendChild(opt);
        }
        if (select.options.length === 0) {
          const opt = document.createElement('option');
          opt.value = '';
          opt.textContent = 'No other running sessions';
          opt.disabled = true;
          select.appendChild(opt);
        }
      } catch (err) {
        console.error('Failed to load sessions:', err);
      }

      document.getElementById('sendto-text').focus();
    }

    function closeSendToModal() {
      document.getElementById('sendto-modal').style.display = 'none';
      sendToImages = [];
      renderSendToImages();
    }

    // Image handling for send-to modal
    document.getElementById('sendto-file-input').addEventListener('change', async (e) => {
      for (const file of e.target.files) {
        if (!file.type.match(/^image\/(jpeg|png|gif|webp)$/)) continue;
        const img = await fileToBase64(file);
        sendToImages.push(img);
      }
      e.target.value = '';
      renderSendToImages();
    });

    function renderSendToImages() {
      const container = document.getElementById('sendto-images-preview');
      const list = document.getElementById('sendto-images-list');
      if (sendToImages.length === 0) {
        container.style.display = 'none';
        list.innerHTML = '';
        return;
      }
      container.style.display = 'block';
      list.innerHTML = '';
      sendToImages.forEach((img, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'image-thumb';
        thumb.innerHTML = `
          <img src="${img.dataUrl}" alt="attachment" />
          <button class="image-thumb-remove" onclick="removeSendToImage(${i})">&times;</button>
        `;
        list.appendChild(thumb);
      });
    }

    function removeSendToImage(index) {
      sendToImages.splice(index, 1);
      renderSendToImages();
    }

    async function sendToWorkspace() {
      const targetId = document.getElementById('sendto-target').value;
      const text = document.getElementById('sendto-text').value.trim();
      if (!targetId || !text) {
        document.getElementById('sendto-text').focus();
        return;
      }

      const btn = document.getElementById('sendto-submit-btn');
      btn.disabled = true;
      btn.textContent = sendToMode === 'summary' ? 'Summarizing...' : 'Sending...';

      try {
        const images = sendToImages.length > 0
          ? sendToImages.map(img => ({ mediaType: img.mediaType, data: img.data }))
          : undefined;

        if (sendToMode === 'summary') {
          btn.innerHTML = '<span class="btn-spinner"></span> Summarizing...';
        }

        const res = await fetch(`${API}/api/sessions/${currentSessionId}/send-to`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ targetSessionId: targetId, text, images, mode: sendToMode }),
        });
        const data = await res.json();

        if (data.error) {
          btn.textContent = 'Failed';
          btn.style.background = '#da3633';
          setTimeout(() => { btn.textContent = 'Send'; btn.disabled = false; btn.style.background = ''; }, 2000);
          return;
        }

        btn.textContent = 'Sent!';
        btn.style.background = '#238636';
        setTimeout(() => {
          closeSendToModal();
          btn.textContent = 'Send';
          btn.disabled = false;
          btn.style.background = '';
        }, 1000);
      } catch (err) {
        btn.textContent = 'Error';
        setTimeout(() => { btn.textContent = 'Send'; btn.disabled = false; btn.style.background = ''; }, 2000);
      }
    }

    // Init
    (async () => {
      try {
        const res = await fetch(`${API}/api/state`);
        const data = await res.json();
        if (data.workspaceDir) WORKSPACE_DIR = data.workspaceDir;
      } catch {}
    })();
    loadSessions();
    connectWS();
  </script>
</body>
</html>
