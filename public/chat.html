<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chat — Claude Code Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@15/lib/marked.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <nav>
      <a href="/">Dashboard</a>
      <a href="/chat.html" class="active">Chat</a>
    </nav>

    <div id="session-picker" class="panel">
      <div class="picker-header">
        <h2>Select a Session</h2>
        <button id="restore-btn" onclick="openRestoreModal()">Restore Session</button>
      </div>
      <div id="session-list"></div>
    </div>

    <div id="chat-view" class="panel" style="display:none">
      <div id="chat-header">
        <div id="chat-header-left">
          <button id="back-btn" onclick="showPicker()">&larr; Back</button>
          <span id="chat-session-name"></span>
          <span id="chat-session-status" class="status"></span>
        </div>
        <label id="rc-toggle">
          <input type="checkbox" id="rc-checkbox" onchange="toggleRemoteControl()" />
          <span>Remote Control</span>
        </label>
      </div>
      <div id="messages"></div>
      <form id="chat-form">
        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off" />
        <button type="button" id="interrupt-btn" onclick="interruptSession()" style="display:none">Stop</button>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </div>
    <!-- Restore session modal -->
    <div id="restore-modal" style="display:none">
      <div class="restore-backdrop" onclick="closeRestoreModal()"></div>
      <div class="restore-content">
        <div class="restore-header">
          <h3>Restore Session</h3>
          <button onclick="closeRestoreModal()" class="restore-close">&times;</button>
        </div>
        <div id="restore-body">
          <div id="restore-folders">
            <p class="restore-hint">Select a project folder to browse sessions:</p>
            <div id="restore-folder-list"></div>
          </div>
          <div id="restore-sessions" style="display:none">
            <button onclick="showFolders()" class="restore-back">&larr; Back to folders</button>
            <p class="restore-hint">Sessions in <strong id="restore-folder-name"></strong>:</p>
            <div id="restore-session-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    let ws = null;
    let currentRoom = null;
    let currentSessionId = null;

    async function loadSessions() {
      const res = await fetch(`${API}/api/sessions`);
      const data = await res.json();
      const list = document.getElementById('session-list');
      list.innerHTML = '';

      for (const s of data.sessions) {
        const div = document.createElement('div');
        div.className = 'session-card';
        const channelBadge = s.channel
          ? `<span class="badge channel">${s.channel.type}:${s.channel.targetId}</span>`
          : '';
        const rcBadge = s.remoteControl
          ? '<span class="badge rc">RC</span>'
          : '';
        div.innerHTML = `
          <div class="session-name">${s.name}</div>
          <div class="session-meta">
            <span class="status ${s.status}">${s.status}</span>
            <span>${s.messageCount} msgs</span>
            ${channelBadge}${rcBadge}
            <code>${s.id.slice(0, 8)}</code>
          </div>
        `;
        div.onclick = () => joinSession(s.id, s.name, s.status, s.remoteControl);
        list.appendChild(div);
      }
    }

    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);

      ws.onopen = () => console.log('WS connected');
      ws.onclose = () => {
        console.log('WS disconnected, reconnecting...');
        setTimeout(connectWS, 2000);
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'msg' && msg.room === currentRoom) {
          appendMessage(msg.from, msg.text, msg.ts);
          // Show interrupt button when assistant is responding
          if (msg.from === 'assistant') {
            showInterrupt(true);
            // Auto-hide after a pause (response likely done)
            clearTimeout(window._interruptTimer);
            window._interruptTimer = setTimeout(() => showInterrupt(false), 3000);
          }
        }
      };
    }

    async function joinSession(id, name, status, remoteControl) {
      currentRoom = id;
      currentSessionId = id;
      document.getElementById('session-picker').style.display = 'none';
      document.getElementById('chat-view').style.display = 'flex';
      document.getElementById('chat-session-name').textContent = name;
      const statusEl = document.getElementById('chat-session-status');
      statusEl.textContent = status;
      statusEl.className = `status ${status}`;

      // Set remote control checkbox
      const rcCheckbox = document.getElementById('rc-checkbox');
      rcCheckbox.checked = remoteControl;

      // Clear and load history
      const container = document.getElementById('messages');
      container.innerHTML = '<div class="loading">Loading messages...</div>';

      try {
        const res = await fetch(`${API}/api/sessions/${id}/messages`);
        const data = await res.json();
        container.innerHTML = '';

        for (const msg of data.messages) {
          appendMessage(msg.from, msg.text, msg.ts, msg.type);
        }
      } catch (err) {
        container.innerHTML = '';
        console.error('Failed to load messages:', err);
      }

      document.getElementById('chat-input').focus();

      // Join the room via WebSocket
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'join', room: id, sessionId: id }));
      }
    }

    function showPicker() {
      currentRoom = null;
      currentSessionId = null;
      document.getElementById('session-picker').style.display = 'block';
      document.getElementById('chat-view').style.display = 'none';
      loadSessions();
    }

    function showInterrupt(show) {
      document.getElementById('interrupt-btn').style.display = show ? 'inline-block' : 'none';
    }

    async function interruptSession() {
      if (!currentSessionId) return;
      showInterrupt(false);
      try {
        const res = await fetch(`${API}/api/sessions/${currentSessionId}/interrupt`, { method: 'POST' });
        const data = await res.json();
        if (data.interrupted) {
          appendMessage('assistant', '⏹ Session interrupted', new Date().toISOString(), 'tool');
        } else if (data.error) {
          appendMessage('assistant', 'Interrupt failed: ' + data.error, new Date().toISOString(), 'tool');
        }
      } catch (err) {
        console.error('Interrupt failed:', err);
      }
    }

    async function toggleRemoteControl() {
      if (!currentSessionId) return;
      const checkbox = document.getElementById('rc-checkbox');
      const enabled = checkbox.checked;

      try {
        const res = await fetch(`${API}/api/sessions/${currentSessionId}/remote-control`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled }),
        });
        const data = await res.json();
        if (data.error) {
          alert('Failed: ' + data.error);
          checkbox.checked = !enabled; // revert
        }
      } catch (err) {
        alert('Failed to toggle remote control');
        checkbox.checked = !enabled; // revert
      }
    }

    function appendMessage(from, text, ts, msgType) {
      const div = document.createElement('div');
      const type = msgType || 'text';
      div.className = `message ${from}` + (type === 'tool' ? ' tool-summary' : '') + (type === 'result' ? ' result' : '');
      const timeStr = ts ? new Date(ts).toLocaleTimeString() : '';
      const prefix = type === 'tool' ? '<span class="tool-icon">⚙️</span> ' : '';

      // Render assistant messages as markdown, user/tool messages as plain text
      let renderedText;
      if (from === 'assistant' && type === 'text' && typeof marked !== 'undefined') {
        renderedText = marked.parse(text || '');
      } else {
        renderedText = prefix + escapeHtml(text);
      }

      div.innerHTML = `<div class="msg-text">${renderedText}</div>${timeStr ? `<div class="msg-time">${timeStr}</div>` : ''}`;
      const container = document.getElementById('messages');
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    document.getElementById('chat-form').onsubmit = (e) => {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !currentRoom) return;

      // Send via WebSocket
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'msg', text }));
      }

      appendMessage('user', text, new Date().toISOString());
      input.value = '';
      showInterrupt(true);
    };

    // --- Restore Session Modal ---

    let diskSessionsCache = null;
    let activeSessionIds = new Set();

    async function openRestoreModal() {
      document.getElementById('restore-modal').style.display = 'flex';
      document.getElementById('restore-folders').style.display = 'block';
      document.getElementById('restore-sessions').style.display = 'none';

      // Load active sessions to know which ones to exclude
      try {
        const res = await fetch(`${API}/api/sessions`);
        const data = await res.json();
        activeSessionIds = new Set(data.sessions.map(s => s.id));
      } catch { activeSessionIds = new Set(); }

      // Load disk sessions
      const folderList = document.getElementById('restore-folder-list');
      folderList.innerHTML = '<div class="loading">Scanning sessions...</div>';

      try {
        const res = await fetch(`${API}/api/disk-sessions`);
        diskSessionsCache = await res.json();

        folderList.innerHTML = '';
        if (diskSessionsCache.folders.length === 0) {
          folderList.innerHTML = '<p style="color:#8b949e;text-align:center;padding:2rem">No session folders found</p>';
          return;
        }

        for (const folder of diskSessionsCache.folders) {
          const sessionCount = diskSessionsCache.sessions[folder]?.length || 0;
          const div = document.createElement('div');
          div.className = 'restore-folder-card';
          div.innerHTML = `
            <div class="restore-folder-name">${folder}</div>
            <div class="restore-folder-meta">${sessionCount} session${sessionCount !== 1 ? 's' : ''}</div>
          `;
          div.onclick = () => showSessions(folder);
          folderList.appendChild(div);
        }
      } catch (err) {
        folderList.innerHTML = `<p style="color:#f85149;text-align:center;padding:2rem">Failed to load: ${err}</p>`;
      }
    }

    function closeRestoreModal() {
      document.getElementById('restore-modal').style.display = 'none';
    }

    function showFolders() {
      document.getElementById('restore-folders').style.display = 'block';
      document.getElementById('restore-sessions').style.display = 'none';
    }

    function showSessions(folder) {
      document.getElementById('restore-folders').style.display = 'none';
      document.getElementById('restore-sessions').style.display = 'block';
      document.getElementById('restore-folder-name').textContent = folder;

      const list = document.getElementById('restore-session-list');
      list.innerHTML = '';

      const sessions = diskSessionsCache.sessions[folder] || [];

      if (sessions.length === 0) {
        list.innerHTML = '<p style="color:#8b949e;text-align:center;padding:2rem">No sessions in this folder</p>';
        return;
      }

      for (const s of sessions) {
        const isActive = activeSessionIds.has(s.id);
        const div = document.createElement('div');
        div.className = 'restore-session-card' + (isActive ? ' already-active' : '');

        const date = new Date(s.lastModified);
        const timeAgo = formatTimeAgo(date);
        const size = formatSize(s.sizeBytes);

        div.innerHTML = `
          <div class="restore-session-info">
            <code>${s.id.slice(0, 12)}...</code>
            <span class="restore-session-meta">${timeAgo} &middot; ${size}</span>
          </div>
          ${isActive
            ? '<span class="badge active-badge">Active</span>'
            : `<button class="restore-action-btn" onclick="restoreSession('${s.id}', event)">Restore</button>`
          }
        `;
        list.appendChild(div);
      }
    }

    function formatTimeAgo(date) {
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 30) return `${days}d ago`;
      return date.toLocaleDateString();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function restoreSession(sessionId, event) {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Restoring...';

      try {
        const res = await fetch(`${API}/api/sessions/new`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resume: sessionId, name: `restored-${sessionId.slice(0, 8)}` }),
        });
        const data = await res.json();

        if (data.error) {
          btn.textContent = 'Failed';
          btn.style.background = '#da3633';
          setTimeout(() => { btn.textContent = 'Restore'; btn.disabled = false; btn.style.background = ''; }, 2000);
          return;
        }

        // Success — mark as active and refresh
        activeSessionIds.add(sessionId);
        btn.textContent = 'Restored!';
        btn.style.background = '#238636';

        // Refresh the sessions list and close modal after a moment
        setTimeout(() => {
          closeRestoreModal();
          loadSessions();
        }, 1000);
      } catch (err) {
        btn.textContent = 'Error';
        btn.disabled = false;
        setTimeout(() => { btn.textContent = 'Restore'; btn.style.background = ''; }, 2000);
      }
    }

    // Init
    loadSessions();
    connectWS();
  </script>
</body>
</html>
